name: Foodcart Deploy Backend Production

on:
  workflow_dispatch:

env:
  VERCEL_CLI_VERSION: "54.15.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
        run: |
          vercel deploy --prod --yes --token="$VERCEL_TOKEN"
