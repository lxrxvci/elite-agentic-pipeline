name: Disable Vercel Deployment Protection

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Disable SSO/deployment protection on Vercel projects
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          BACKEND: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          BACKEND_STAGING: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_STAGING }}
          FRONTEND: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          FRONTEND_STAGING: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND_STAGING }}
        run: |
          set -euo pipefail
          team_q=""
          if [ -n "$VERCEL_ORG_ID" ]; then
            team_q="?teamId=${VERCEL_ORG_ID}"
          fi

          disable_protection() {
            project_id="$1"
            echo "Disabling deployment protection for $project_id ..."
            curl -sS -X PATCH "https://api.vercel.com/v9/projects/${project_id}${team_q}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"ssoProtection":null}' \
              | python3 -c "import sys, json; d=json.load(sys.stdin); print('  ssoProtection:', d.get('ssoProtection')); print('  name:', d.get('name'))"
          }

          disable_protection "$BACKEND"
          disable_protection "$BACKEND_STAGING"
          disable_protection "$FRONTEND"
          disable_protection "$FRONTEND_STAGING"
