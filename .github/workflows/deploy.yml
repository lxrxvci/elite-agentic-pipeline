name: Deploy

on:
  workflow_run:
    workflows: [CI, Security]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  VERCEL_CLI_VERSION: "54.15.0"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Deploy gate check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy gate passed"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Checking CI and Security workflow runs for $HEAD_SHA..."
          ci_status=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].conclusion')
          sec_status=$(gh api "repos/$REPO/actions/workflows/security.yml/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].conclusion')
          echo "CI conclusion: $ci_status"
          echo "Security conclusion: $sec_status"
          if [ "$ci_status" = "success" ] && [ "$sec_status" = "success" ]; then
            echo "Both CI and Security succeeded."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$ci_status" = "failure" ] || [ "$ci_status" = "cancelled" ] || [ "$sec_status" = "failure" ] || [ "$sec_status" = "cancelled" ]; then
            echo 'CI or Security did not succeed; blocking deploy.'
            exit 1
          else
            echo 'CI or Security is still in progress; skipping deploy until the other workflow completes.'
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  migrate-staging:
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: example_project/src/backend
        run: pip install -e ".[dev]"
      - name: Backup reminder
        run: echo "Ensure a database backup has been taken before proceeding."
      - name: Run migrations
        working-directory: example_project/src/backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: alembic upgrade head

  deploy-backend-staging:
    needs: [migrate-staging]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel staging
        id: deploy
        working-directory: example_project/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_STAGING }}
        run: |
          # Run the CLI from the repository root so the project's Root Directory
          # (example_project/src/backend) resolves correctly.
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  deploy-frontend-staging:
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: example_project/src/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Install frontend dependencies
        working-directory: example_project/src/frontend
        run: npm ci
      - name: Deploy frontend to Vercel staging
        id: deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:8000/api/v1' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND_STAGING }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" -b "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  smoke-staging:
    needs: [deploy-backend-staging, deploy-frontend-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test staging
        env:
          BACKEND_URL: ${{ needs.deploy-backend-staging.outputs.url }}
          FRONTEND_URL: ${{ needs.deploy-frontend-staging.outputs.url }}
        run: |
          echo "Running smoke tests against staging..."
          curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL/api/v1/health"
          curl --fail --retry 5 --retry-delay 10 "$FRONTEND_URL"

  migrate-production:
    needs: [smoke-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: example_project/src/backend
        run: pip install -e ".[dev]"
      - name: Backup reminder
        run: echo "Ensure a database backup has been taken before proceeding."
      - name: Run migrations
        working-directory: example_project/src/backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: alembic upgrade head

  deploy-backend-production:
    needs: [migrate-production]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel production
        id: deploy
        working-directory: example_project/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  deploy-frontend-production:
    needs: [smoke-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: example_project/src/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Install frontend dependencies
        working-directory: example_project/src/frontend
        run: npm ci
      - name: Deploy frontend to Vercel production
        id: deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.PRODUCTION_API_URL || 'http://localhost:8000/api/v1' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod -b "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  canary-analysis:
    needs: [deploy-backend-production, deploy-frontend-production]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run canary analysis
        env:
          BACKEND_URL: ${{ needs.deploy-backend-production.outputs.url }}
        run: |
          echo "Running synthetic canary analysis against production..."
          python example_project/scripts/canary_analysis.py \
            --url "$BACKEND_URL/api/v1/health" \
            --requests 100 \
            --concurrency 10 \
            --max-error-rate 0.01 \
            --max-latency-p99 0.5

  smoke-production:
    needs: [canary-analysis, deploy-backend-production, deploy-frontend-production]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test production
        env:
          BACKEND_URL: ${{ needs.deploy-backend-production.outputs.url }}
          FRONTEND_URL: ${{ needs.deploy-frontend-production.outputs.url }}
        run: |
          echo "Running smoke tests against production..."
          curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL/api/v1/health"
          curl --fail --retry 5 --retry-delay 10 "$FRONTEND_URL"

  rollback-on-failure:
    needs: [canary-analysis, smoke-production]
    if: failure()
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Rollback production deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_BACKEND: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          VERCEL_PROJECT_ID_FRONTEND: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          set -euo pipefail
          team_q=""
          if [ -n "$VERCEL_ORG_ID" ]; then
            team_q="?teamId=${VERCEL_ORG_ID}"
          fi

          previous_url() {
            project_id="$1"
            curl -sS "https://api.vercel.com/v6/deployments?projectId=${project_id}&target=production&limit=2&state=READY${team_q}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys, json; ds=json.load(sys.stdin).get('deployments', []); print(ds[1]['url'] if len(ds) > 1 else '')"
          }

          backend_url=$(previous_url "$VERCEL_PROJECT_ID_BACKEND")
          frontend_url=$(previous_url "$VERCEL_PROJECT_ID_FRONTEND")

          if [ -n "$backend_url" ]; then
            echo "Rolling back backend to https://$backend_url ..."
            vercel rollback "https://$backend_url" --token "$VERCEL_TOKEN" --yes
          else
            echo "No previous backend deployment found; skipping backend rollback."
          fi

          if [ -n "$frontend_url" ]; then
            echo "Rolling back frontend to https://$frontend_url ..."
            vercel rollback "https://$frontend_url" --token "$VERCEL_TOKEN" --yes
          else
            echo "No previous frontend deployment found; skipping frontend rollback."
          fi
      - name: Verify rollback health
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
        run: |
          echo "Verifying rollback health..."
          curl -fsS --retry 10 --retry-delay 5 "$BACKEND_URL/api/v1/health" || exit 1
          curl -fsS --retry 10 --retry-delay 5 "$FRONTEND_URL" || exit 1
