name: CI — Frontend

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example_project/src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: example_project/src/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run test:a11y
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: example_project/src/frontend/coverage
