name: CI — Frontend

on:
  workflow_call:
    inputs:
      project-dir:
        required: false
        type: string
        default: foodcart-saas
      node-version:
        required: true
        type: string

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}/src/frontend
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_ci
      NEXT_PUBLIC_ENABLED_FEATURES: photo-onboarding-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.project-dir }}/src/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run test:a11y
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: ${{ inputs.project-dir }}/src/frontend/coverage
