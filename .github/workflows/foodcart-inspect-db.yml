name: Foodcart Inspect Production Database

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: foodcart-saas/src/backend
        run: pip install -e .
      - name: Inspect database
        working-directory: foodcart-saas/src/backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          python - <<'PY'
          import os, sqlalchemy as sa
          url = os.environ["DATABASE_URL"]
          engine = sa.create_engine(url)
          with engine.connect() as conn:
              # alembic version
              try:
                  rows = conn.execute(sa.text("SELECT version_num FROM alembic_version")).fetchall()
                  print("alembic_version:", [r[0] for r in rows])
              except Exception as exc:
                  print("alembic_version error:", exc)
              # tables
              rows = conn.execute(sa.text("SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name")).fetchall()
              print("tables:", [r[0] for r in rows])
          PY
