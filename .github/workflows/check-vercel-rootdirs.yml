name: Check Vercel Root Directories

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch current project root directories
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          BACKEND: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          BACKEND_STAGING: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_STAGING }}
          FRONTEND: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          FRONTEND_STAGING: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND_STAGING }}
        run: |
          set -uo pipefail
          team_q=""
          [ -n "$VERCEL_ORG_ID" ] && team_q="?teamId=${VERCEL_ORG_ID}"
          for id in "$BACKEND" "$BACKEND_STAGING" "$FRONTEND" "$FRONTEND_STAGING"; do
            echo "Project $id:"
            curl -sS "https://api.vercel.com/v9/projects/${id}${team_q}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys, json; d=json.load(sys.stdin); print('  rootDirectory:', repr(d.get('rootDirectory'))); print('  name:', d.get('name'))"
          done
