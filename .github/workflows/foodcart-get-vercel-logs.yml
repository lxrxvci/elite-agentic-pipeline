name: Foodcart Get Vercel Runtime Logs

on:
  workflow_dispatch:
    inputs:
      deployment-id:
        description: "Vercel deployment ID"
        required: true
        type: string
      project-secret-suffix:
        description: "Secret suffix for VERCEL_PROJECT_ID_*"
        required: true
        default: "BACKEND"
        type: choice
        options:
          - BACKEND
          - BACKEND_STAGING
          - FRONTEND
          - FRONTEND_STAGING

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Get Vercel runtime logs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', github.event.inputs.project-secret-suffix)] }}
          DEPLOYMENT_ID: ${{ github.event.inputs.deployment-id }}
        run: |
          curl -sS "https://api.vercel.com/v2/projects/$PROJECT_ID/deployments/$DEPLOYMENT_ID/logs?limit=100" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq '.logs // .'
