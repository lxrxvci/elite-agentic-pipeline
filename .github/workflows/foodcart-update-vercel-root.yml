name: Foodcart Update Vercel Root Directory

on:
  workflow_dispatch:
    inputs:
      project-secret-suffix:
        description: "Secret suffix for VERCEL_PROJECT_ID_*"
        required: true
        default: "BACKEND"
        type: choice
        options:
          - BACKEND
          - BACKEND_STAGING
          - FRONTEND
          - FRONTEND_STAGING
      root-directory:
        description: "New root directory relative to repo root"
        required: true
        default: "foodcart-saas/src/backend"
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update Vercel project root directory
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', github.event.inputs.project-secret-suffix)] }}
        run: |
          curl -sS -X PATCH "https://api.vercel.com/v9/projects/$PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"rootDirectory\":\"${{ github.event.inputs.root-directory }}\"}" | jq .
