name: DORA Metrics

on:
  workflow_call:
    inputs:
      project-dir:
        required: false
        type: string
        default: foodcart-saas
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

env:
  PROJECT_DIR: foodcart-saas

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect DORA metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ inputs.project-dir || env.PROJECT_DIR }}
        run: |
          REPO_NAME="${{ github.repository }}"
          OWNER="${REPO_NAME%%/*}"
          REPO="${REPO_NAME##*/}"
          python scripts/dora_collector.py \
            --owner "$OWNER" \
            --repo "$REPO" \
            --days 30 \
            --output dora-metrics.prom
      - name: Commit DORA metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.project-dir || env.PROJECT_DIR }}/dora-metrics.prom"
          git diff --staged --quiet || git commit -m "chore: update DORA metrics"
          git push
