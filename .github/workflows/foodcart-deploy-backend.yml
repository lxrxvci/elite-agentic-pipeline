name: Foodcart Deploy Backend

on:
  workflow_dispatch:
    inputs:
      project-secret-suffix:
        description: "Backend project suffix"
        required: true
        default: "BACKEND"
        type: choice
        options:
          - BACKEND
          - BACKEND_STAGING
      environment:
        description: "Vercel deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

env:
  VERCEL_CLI_VERSION: "54.15.0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment == 'production' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', github.event.inputs.project-secret-suffix)] }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            vercel deploy --prod --yes --token="$VERCEL_TOKEN"
          else
            vercel deploy --yes --token="$VERCEL_TOKEN"
          fi
