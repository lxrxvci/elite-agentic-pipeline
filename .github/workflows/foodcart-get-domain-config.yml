name: Foodcart Get Vercel Domain Config

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Custom domain"
        required: true
        type: string
      project-secret-suffix:
        description: "Frontend project suffix"
        required: true
        default: "FRONTEND"
        type: choice
        options:
          - FRONTEND
          - FRONTEND_STAGING

jobs:
  config:
    runs-on: ubuntu-latest
    steps:
      - name: Get domain config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', github.event.inputs.project-secret-suffix)] }}
          DOMAIN: ${{ github.event.inputs.domain }}
        run: |
          curl -sS "https://api.vercel.com/v6/domains/$DOMAIN/config?projectId=$PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq .
