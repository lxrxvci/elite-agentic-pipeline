name: Deploy

on:
  workflow_run:
    workflows: [CI, Security]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  # Repository-root layout for the foodcart-saas project. All src/backend and
  # src/frontend paths below are relative to this root.
  PROJECT_DIR: .
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  VERCEL_CLI_VERSION: "54.15.0"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Deploy gate check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deploy gate passed"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Checking CI and Security workflow runs for $HEAD_SHA..."
          ci_status=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].conclusion')
          sec_status=$(gh api "repos/$REPO/actions/workflows/security.yml/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].conclusion')
          echo "CI conclusion: $ci_status"
          echo "Security conclusion: $sec_status"
          if [ "$ci_status" = "success" ] && [ "$sec_status" = "success" ]; then
            echo "Both CI and Security succeeded."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$ci_status" = "failure" ] || [ "$ci_status" = "cancelled" ] || [ "$sec_status" = "failure" ] || [ "$sec_status" = "cancelled" ]; then
            echo 'CI or Security did not succeed; blocking deploy.'
            exit 1
          else
            echo 'CI or Security is still in progress; skipping deploy until the other workflow completes.'
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  migrate-staging:
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Backup reminder
        run: echo "Ensure a database backup has been taken before proceeding."
      - name: Run migrations
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: alembic upgrade head

  deploy-backend-staging:
    needs: [migrate-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel staging
        id: deploy
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_STAGING }}
        run: |
          # Run the CLI from the repository root so the project's Root Directory
          # (${{ env.PROJECT_DIR }}/src/backend) resolves correctly.
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  deploy-frontend-staging:
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/src/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Install frontend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/frontend
        run: npm ci
      - name: Deploy frontend to Vercel staging
        id: deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:8000/api/v1' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND_STAGING }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" -b "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  smoke-staging:
    needs: [deploy-backend-staging, deploy-frontend-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Smoke test staging
        env:
          BACKEND_URL: ${{ needs.deploy-backend-staging.outputs.url }}
          FRONTEND_URL: ${{ needs.deploy-frontend-staging.outputs.url }}
        run: |
          echo "Running smoke tests against staging..."
          curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL/health"
          curl --fail --retry 5 --retry-delay 10 "$FRONTEND_URL"

  migrate-production:
    needs: [smoke-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Backup reminder
        run: echo "Ensure a database backup has been taken before proceeding."
      - name: Run migrations
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: alembic upgrade head

  deploy-backend-canary:
    name: Deploy backend canary
    needs: [migrate-production]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel canary project
        id: deploy
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_CANARY }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  enable-canary:
    name: Enable backend canary routing (Ring 1 - 5%)
    needs: [deploy-backend-canary]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Route 5% of traffic to canary backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          CANARY_API_URL: ${{ needs.deploy-backend-canary.outputs.url }}
        run: |
          python ${{ env.PROJECT_DIR }}/scripts/set_canary.py \
            --edge-config-id "$VERCEL_EDGE_CONFIG_ID" \
            --vercel-token "$VERCEL_TOKEN" \
            --team-id "$VERCEL_TEAM_ID" \
            --percentage 5 \
            --api-url "$CANARY_API_URL" \
            --check-url "$CANARY_API_URL/health" \
            --check-requests 20 \
            --require-healthy
      - name: Wait for Edge Config propagation
        run: sleep 30

  deploy-frontend-production:
    needs: [smoke-staging, enable-canary]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/src/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Install frontend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/frontend
        run: npm ci
      - name: Deploy frontend to Vercel production
        id: deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.PRODUCTION_API_URL || 'http://localhost:8000/api/v1' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod -b "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  canary-analysis:
    name: Canary analysis
    needs: [deploy-backend-canary, deploy-frontend-production]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run canary analysis
        env:
          BASELINE_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          CANARY_URL: ${{ needs.deploy-backend-canary.outputs.url }}
          PROMETHEUS_URL: ${{ vars.PROMETHEUS_URL || '' }}
        run: |
          echo "Running canary analysis: baseline=$BASELINE_URL canary=$CANARY_URL"
          python ${{ env.PROJECT_DIR }}/scripts/canary_analysis.py \
            --baseline-url "$BASELINE_URL/health" \
            --canary-url "$CANARY_URL/health" \
            --requests 100 \
            --concurrency 5 \
            --max-error-rate 0.001 \
            --max-latency-p95 0.3 \
            --max-latency-p99 1.0 \
            --max-error-rate-regression 0.001 \
            --max-latency-regression 0.2 \
            --max-latency-regression-p99 0.5 \
            --prometheus-url "$PROMETHEUS_URL" \
            --window 5m \
            --recommend

  slo-check:
    name: SLO check (canary window)
    needs: [canary-analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Evaluate SLOs against canary traffic
        env:
          PROMETHEUS_URL: ${{ vars.PROMETHEUS_URL || '' }}
        run: |
          python ${{ env.PROJECT_DIR }}/scripts/slo_check.py \
            --prometheus-url "$PROMETHEUS_URL" \
            --window 5m \
            --availability-threshold 0.999 \
            --error-rate-threshold 0.001 \
            --latency-p95-threshold 0.3 \
            --ai-latency-p95-threshold 5.0 \
            --saturation-threshold 0.8 \
            --recommend

  promote-canary:
    name: Promote canary to production
    needs: [canary-analysis, slo-check, deploy-backend-canary]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel production project
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod --yes)
          echo "Promoted backend to production: $url"
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Disable canary routing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          python ${{ env.PROJECT_DIR }}/scripts/set_canary.py \
            --edge-config-id "$VERCEL_EDGE_CONFIG_ID" \
            --vercel-token "$VERCEL_TOKEN" \
            --team-id "$VERCEL_TEAM_ID" \
            --percentage 0

  smoke-production:
    needs: [promote-canary, deploy-frontend-production]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Smoke test production
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          FRONTEND_URL: ${{ needs.deploy-frontend-production.outputs.url }}
        run: |
          echo "Running smoke tests against production..."
          curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL/health"
          curl --fail --retry 5 --retry-delay 10 "$FRONTEND_URL"

  production-slo-check:
    name: SLO check (production)
    needs: [smoke-production]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Evaluate SLOs after full promotion
        env:
          PROMETHEUS_URL: ${{ vars.PROMETHEUS_URL || '' }}
        run: |
          python ${{ env.PROJECT_DIR }}/scripts/slo_check.py \
            --prometheus-url "$PROMETHEUS_URL" \
            --window 5m \
            --availability-threshold 0.999 \
            --error-rate-threshold 0.001 \
            --latency-p95-threshold 0.3 \
            --ai-latency-p95-threshold 5.0 \
            --saturation-threshold 0.8 \
            --recommend

  tag-release:
    name: Tag deployment candidate
    needs: [smoke-production, production-slo-check]
    if: needs.smoke-production.result == 'success' && needs.production-slo-check.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
      FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create deployment candidate tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          short_sha=$(git rev-parse --short HEAD)
          tag="release-${short_sha}-${{ github.run_number }}"
          git tag -a "$tag" -m "Deployment candidate ${tag}

          Backend: ${BACKEND_URL}
          Frontend: ${FRONTEND_URL}
          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin "$tag"
          echo "Created and pushed tag $tag"

  rollback-on-failure:
    needs: [canary-analysis, slo-check, promote-canary, deploy-frontend-production, smoke-production, production-slo-check]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Disable canary routing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          python ${{ env.PROJECT_DIR }}/scripts/set_canary.py \
            --edge-config-id "$VERCEL_EDGE_CONFIG_ID" \
            --vercel-token "$VERCEL_TOKEN" \
            --team-id "$VERCEL_TEAM_ID" \
            --percentage 0 || true
      - name: Configure AWS credentials via OIDC
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Rollback production deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_BACKEND: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          VERCEL_PROJECT_ID_FRONTEND: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          set -euo pipefail
          team_q=""
          if [ -n "$VERCEL_ORG_ID" ]; then
            team_q="?teamId=${VERCEL_ORG_ID}"
          fi

          previous_url() {
            project_id="$1"
            curl -sS "https://api.vercel.com/v6/deployments?projectId=${project_id}&target=production&limit=2&state=READY${team_q}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys, json; ds=json.load(sys.stdin).get('deployments', []); print(ds[1]['url'] if len(ds) > 1 else '')"
          }

          backend_url=$(previous_url "$VERCEL_PROJECT_ID_BACKEND")
          frontend_url=$(previous_url "$VERCEL_PROJECT_ID_FRONTEND")

          if [ -n "$backend_url" ]; then
            echo "Rolling back backend to https://$backend_url ..."
            vercel rollback "https://$backend_url" --token "$VERCEL_TOKEN" --yes
          else
            echo "No previous backend deployment found; skipping backend rollback."
          fi

          if [ -n "$frontend_url" ]; then
            echo "Rolling back frontend to https://$frontend_url ..."
            vercel rollback "https://$frontend_url" --token "$VERCEL_TOKEN" --yes
          else
            echo "No previous frontend deployment found; skipping frontend rollback."
          fi
      - name: Verify rollback health
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
        run: |
          echo "Verifying rollback health..."
          curl -fsS --retry 10 --retry-delay 5 "$BACKEND_URL/health" || exit 1
          curl -fsS --retry 10 --retry-delay 5 "$FRONTEND_URL" || exit 1
