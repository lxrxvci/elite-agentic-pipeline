name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Service to rollback"
        required: true
        default: "frontend"
        type: choice
        options:
          - frontend
          - backend
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: "20"
  VERCEL_CLI_VERSION: "54.15.0"

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Disable canary traffic
        if: github.event.inputs.environment == 'production'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          echo "Disabling canary traffic split..."
          python scripts/set_canary.py --percentage 0 || true
      - name: Rollback Vercel deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_BACKEND: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          VERCEL_PROJECT_ID_BACKEND_STAGING: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_STAGING }}
          VERCEL_PROJECT_ID_FRONTEND: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
          VERCEL_PROJECT_ID_FRONTEND_STAGING: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND_STAGING }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            if [ "${{ github.event.inputs.target }}" = "backend" ]; then
              PROJECT_ID="$VERCEL_PROJECT_ID_BACKEND"
            else
              PROJECT_ID="$VERCEL_PROJECT_ID_FRONTEND"
            fi
          else
            if [ "${{ github.event.inputs.target }}" = "backend" ]; then
              PROJECT_ID="$VERCEL_PROJECT_ID_BACKEND_STAGING"
            else
              PROJECT_ID="$VERCEL_PROJECT_ID_FRONTEND_STAGING"
            fi
          fi
          echo "Rolling back $PROJECT_ID to previous deployment..."
          vercel rollback "$PROJECT_ID" --token "$VERCEL_TOKEN" --yes
      - name: Verify rollback health
        env:
          BACKEND_URL: ${{ github.event.inputs.environment == 'production' && vars.PRODUCTION_BACKEND_URL || vars.STAGING_BACKEND_URL }}
          FRONTEND_URL: ${{ github.event.inputs.environment == 'production' && vars.PRODUCTION_FRONTEND_URL || vars.STAGING_FRONTEND_URL }}
        run: |
          if [ "${{ github.event.inputs.target }}" = "backend" ]; then
            curl -fsS --retry 10 --retry-delay 5 "$BACKEND_URL/api/v1/health" || exit 1
          else
            curl -fsS --retry 10 --retry-delay 5 "$FRONTEND_URL" || exit 1
          fi
