name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - 'example_project/infra/**'
      - 'example_project/observability/**'
  push:
    branches: [main]
    paths:
      - 'example_project/infra/**'
      - 'example_project/observability/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  TF_WORKSPACE: default
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  INFRA_DIR: example_project/infra

jobs:
  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.INFRA_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Write backend config
        env:
          BACKEND_CONFIG: ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
        if: env.BACKEND_CONFIG != ''
        run: |
          cat > backend.tfvars <<'EOF'
          ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
          EOF

      - name: Terraform Init
        run: |
          if [ -f backend.tfvars ]; then
            terraform init -backend-config=backend.tfvars
          else
            echo "WARNING: backend.tfvars not provided; using local backend."
            terraform init -backend=false
          fi

      - name: Select workspace
        run: terraform workspace select "$TF_WORKSPACE" || terraform workspace new "$TF_WORKSPACE"

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Post plan to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c379441c0 # v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`terraform\n${process.env.PLAN || 'No plan output'}\n\`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Upload plan artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfplan-${{ github.event.pull_request.number }}
          path: ${{ env.INFRA_DIR }}/tfplan

  apply:
    name: Terraform Apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.INFRA_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Write backend config
        env:
          BACKEND_CONFIG: ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
        if: env.BACKEND_CONFIG != ''
        run: |
          cat > backend.tfvars <<'EOF'
          ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
          EOF

      - name: Terraform Init
        run: |
          if [ -f backend.tfvars ]; then
            terraform init -backend-config=backend.tfvars
          else
            echo "WARNING: backend.tfvars not provided; using local backend."
            terraform init -backend=false
          fi

      - name: Select workspace
        run: terraform workspace select "$TF_WORKSPACE" || terraform workspace new "$TF_WORKSPACE"

      - name: Terraform Plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
