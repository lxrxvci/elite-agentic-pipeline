name: Security Scan

on:
  workflow_call:
    inputs:
      project-dir:
        required: false
        type: string
        default: .

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ inputs.project-dir }}/src/backend/pyproject.toml

      - name: Install Python dependencies
        working-directory: ${{ inputs.project-dir }}/src/backend
        run: pip install -e ".[dev]"

      - name: Run Bandit
        working-directory: ${{ inputs.project-dir }}/src/backend
        run: bandit -r src -ll -ii

  npm-audit:
    name: npm audit (frontend dependencies)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ inputs.project-dir }}/src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ inputs.project-dir }}/src/frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ inputs.project-dir }}/src/frontend
        run: npm audit --audit-level=high

  semgrep:
    name: Semgrep (JS/TS SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: semgrep/semgrep:1.91.0
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep
        env:
          SEMGREP_RULES: >-
            p/javascript
            p/typescript
            p/react
            p/security-audit
        run: semgrep ci --error

  dependency-review:
    name: GitHub dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: GitHub dependency review
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
        with:
          fail-on-severity: high

  trufflehog:
    name: TruffleHog (secret detection)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect secrets
        uses: trufflesecurity/trufflehog@7e78ca385fb82c19568c7a4b341c97d57d9aa5e1 # v3.82.2
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha || 'HEAD~1' }}
          head: ${{ github.sha || github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --only-verified

  required:
    name: Security scan required
    needs: [bandit, npm-audit, semgrep, dependency-review, trufflehog]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check all security jobs passed
        run: |
          echo "bandit=${{ needs.bandit.result }}"
          echo "npm-audit=${{ needs.npm-audit.result }}"
          echo "semgrep=${{ needs.semgrep.result }}"
          echo "dependency-review=${{ needs.dependency-review.result }}"
          echo "trufflehog=${{ needs.trufflehog.result }}"
          if [ "${{ needs.bandit.result }}" = "failure" ] || [ "${{ needs.bandit.result }}" = "cancelled" ] || \
             [ "${{ needs.npm-audit.result }}" = "failure" ] || [ "${{ needs.npm-audit.result }}" = "cancelled" ] || \
             [ "${{ needs.semgrep.result }}" = "failure" ] || [ "${{ needs.semgrep.result }}" = "cancelled" ] || \
             [ "${{ needs.trufflehog.result }}" = "failure" ] || [ "${{ needs.trufflehog.result }}" = "cancelled" ]; then
            echo "One or more required security scans failed."
            exit 1
          fi
          # dependency-review is skipped (not cancelled/failure) on non-PR events; allow skipped.
          if [ "${{ needs.dependency-review.result }}" = "failure" ] || [ "${{ needs.dependency-review.result }}" = "cancelled" ]; then
            echo "Dependency review failed."
            exit 1
          fi
          echo "All required security scans passed."

      - name: Write security feedback
        working-directory: ${{ inputs.project-dir }}
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          feedback = {
              "status": "collected",
              "checks": {
                  "bandit": {"passed": True},
                  "npm_audit": {"passed": True},
                  "semgrep": {"passed": True},
                  "dependency_review": {"passed": True},
                  "trufflehog": {"passed": True},
              },
          }
          Path(".security-feedback.json").write_text(json.dumps(feedback, indent=2))
          print("Wrote .security-feedback.json")
          PY
