name: CI — Frontend

on:
  workflow_call:
    inputs:
      project-dir:
        required: false
        type: string
        default: .
      node-version:
        required: true
        type: string

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}/src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.project-dir }}/src/frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run test:a11y
      - run: npm run build
      - name: Write frontend CI feedback
        working-directory: ${{ inputs.project-dir }}
        run: python scripts/ci_feedback.py --project-dir . --frontend-only
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: ${{ inputs.project-dir }}/src/frontend/coverage
