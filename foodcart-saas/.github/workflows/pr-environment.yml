name: PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'infra/**'
      - '.github/workflows/pr-environment.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: pr-environment-${{ github.event.number }}
  cancel-in-progress: false

env:
  TF_VAR_project_name: foodcart-saas
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_github_owner: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.event.repository.name }}
  TF_VAR_enable_pr_environments: true

jobs:
  plan-and-apply:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Generate DB password
        id: db
        run: echo "password=$(openssl rand -base64 32)" >> "$GITHUB_OUTPUT"

      - name: Write Terraform backend override
        env:
          BACKEND_CONFIG: ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
        run: |
          if [ -n "$BACKEND_CONFIG" ]; then
            printf '%s\n' "$BACKEND_CONFIG" > backend.hcl
            printf 'terraform {\n  backend "s3" {}\n}\n' > backend_override.tf
          fi

      - name: Terraform init
        env:
          BACKEND_CONFIG: ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
        run: |
          if [ -n "$BACKEND_CONFIG" ]; then
            terraform init -backend-config=backend.hcl
          else
            terraform init
          fi

      - name: Select Terraform workspace
        run: |
          terraform workspace new "pr-${{ github.event.number }}" || terraform workspace select "pr-${{ github.event.number }}"

      - name: Terraform plan
        env:
          TF_VAR_db_password: ${{ steps.db.outputs.password }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        env:
          TF_VAR_db_password: ${{ steps.db.outputs.password }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Capture preview outputs
        id: outputs
        run: |
          echo "bucket=$(terraform output -raw preview_bucket)" >> "$GITHUB_OUTPUT" || true
          echo "table=$(terraform output -raw preview_table)" >> "$GITHUB_OUTPUT" || true

      - name: Post preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body="Preview environment created for PR #${{ github.event.number }}.\n\n- Workspace: \`pr-${{ github.event.number }}\`\n- Preview bucket: \`${{ steps.outputs.outputs.bucket || 'n/a' }}\`\n- Preview table: \`${{ steps.outputs.outputs.table || 'n/a' }}\`"
          gh pr comment ${{ github.event.number }} --body "$body"

  destroy:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Write Terraform backend override
        env:
          BACKEND_CONFIG: ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
        run: |
          if [ -n "$BACKEND_CONFIG" ]; then
            printf '%s\n' "$BACKEND_CONFIG" > backend.hcl
            printf 'terraform {\n  backend "s3" {}\n}\n' > backend_override.tf
          fi

      - name: Terraform init
        env:
          BACKEND_CONFIG: ${{ secrets.TERRAFORM_BACKEND_CONFIG }}
        run: |
          if [ -n "$BACKEND_CONFIG" ]; then
            terraform init -backend-config=backend.hcl
          else
            terraform init
          fi

      - name: Select Terraform workspace
        run: |
          terraform workspace select "pr-${{ github.event.number }}" || terraform workspace new "pr-${{ github.event.number }}"

      - name: Terraform destroy
        env:
          TF_VAR_db_password: change-me-${{ github.run_id }}
        run: terraform destroy -auto-approve -input=false

      - name: Post destroy comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.number }} --body "Preview environment destroyed for PR #${{ github.event.number }}."
