server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      # Mounted to a named Docker volume so traces survive container restarts.
      # Production should use GCS/S3 backend storage.
      path: /var/tempo/blocks
