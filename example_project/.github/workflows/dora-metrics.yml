name: DORA Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect DORA metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME="${{ github.repository }}"
          OWNER="${REPO_NAME%%/*}"
          REPO="${REPO_NAME##*/}"
          python scripts/dora_collector.py \
            --owner "$OWNER" \
            --repo "$REPO" \
            --days 30 \
            --output dora-metrics.prom
      - uses: actions/upload-artifact@v4
        with:
          name: dora-metrics
          path: dora-metrics.prom
