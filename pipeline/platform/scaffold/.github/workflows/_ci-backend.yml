name: CI — Backend

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      database-url:
        required: true
        type: string
    secrets:
      ci-secret-key:
        description: "Secret key for CI tests and contract tests"
        required: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elite_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: src/backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Run ruff
        id: ruff
        run: ruff check src tests
      - name: Run mypy
        id: mypy
        run: mypy src
      - name: Run bandit
        id: bandit
        run: bandit -r src -ll -ii
      - name: Run migrations
        id: migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          SECRET_KEY: ${{ secrets.ci-secret-key }}
      - name: Run pytest
        id: pytest
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          TEST_DATABASE_URL: ${{ inputs.database-url }}
          SECRET_KEY: ${{ secrets.ci-secret-key }}
      - name: Write backend CI feedback
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import json
          import os

          def ok(step_id):
              return os.environ.get(f"{step_id.upper()}_OUTCOME", "failure") == "success"

          feedback = {
              "status": "collected",
              "coverage_percent": 0.0,
              "checks": {
                  "tests": {"passed": ok("pytest")},
                  "lint": {"passed": ok("ruff")},
                  "typecheck": {"passed": ok("mypy")},
                  "bandit": {"passed": ok("bandit")},
                  "migrations": {"passed": ok("migrations")},
              },
          }
          path = "src/backend/.ci-feedback.json"
          with open(path, "w") as f:
              json.dump(feedback, f, indent=2)
          print(f"Wrote {path}")
          PY
        env:
          RUFF_OUTCOME: ${{ steps.ruff.outcome }}
          MYPY_OUTCOME: ${{ steps.mypy.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          MIGRATIONS_OUTCOME: ${{ steps.migrations.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: backend-ci-feedback
          path: src/backend/.ci-feedback.json
