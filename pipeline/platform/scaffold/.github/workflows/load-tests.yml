name: Load Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

env:
  BASE_URL: ${{ vars.LOAD_TEST_BASE_URL || 'http://localhost:8000' }}

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup k6
        uses: grafana/setup-k6-action@c00053c996b4061198c9c24a00474b748abdf8b7 # v1
      - name: Run load tests
        run: k6 run tests/perf/load.js
        env:
          BASE_URL: ${{ env.BASE_URL }}
