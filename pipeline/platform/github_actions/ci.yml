name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Detect changed paths
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/frontend/**'
            backend:
              - 'src/backend/**'
            infra:
              - 'infra/**'
              - 'pipeline/platform/terraform/**'
              - 'observability/**'

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/_ci-frontend.yml
    with:
      node-version: "20"

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/_ci-backend.yml
    with:
      python-version: "3.12"
      database-url: postgresql+psycopg://postgres:postgres@localhost:5432/elite_db
    secrets:
      ci-secret-key: ${{ secrets.CI_SECRET_KEY }}

  infra:
    needs: changes
    if: ${{ needs.changes.outputs.infra == 'true' }}
    uses: ./.github/workflows/_ci-infra.yml

  required:
    name: CI required checks
    needs: [changes, frontend, backend, infra]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs passed
        run: |
          echo "frontend=${{ needs.frontend.result }}"
          echo "backend=${{ needs.backend.result }}"
          echo "infra=${{ needs.infra.result }}"
          if [ "${{ needs.frontend.result }}" = "failure" ] || [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.infra.result }}" = "failure" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          if [ "${{ needs.frontend.result }}" = "cancelled" ] || [ "${{ needs.backend.result }}" = "cancelled" ] || [ "${{ needs.infra.result }}" = "cancelled" ]; then
            echo "One or more CI jobs were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed or were skipped."

  feedback:
    name: Aggregate CI feedback
    needs: [frontend, backend, infra]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Download backend feedback
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-ci-feedback
          path: src/backend
      - name: Download frontend feedback
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-ci-feedback
          path: src/frontend
      - name: Aggregate feedback
        run: python scripts/ci_feedback.py --project-dir . --write-gates
      - name: Upload feedback artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pipeline-feedback
          path: .pipeline/feedback.json
