name: Contract Tests

# Reusable consumer-driven contract-test workflow.
#
# Foodcart SaaS learning: contract tests should be invoked from the CI
# orchestrator after fast commit-stage checks pass (fail-fast). Keep this
# workflow reusable so squads can pass project-dir and database settings.

on:
  workflow_call:
    inputs:
      project-dir:
        required: false
        type: string
        default: example_project
        description: "Repository-relative path to the project root."
      backend-dir:
        required: false
        type: string
        default: src/backend
      frontend-dir:
        required: false
        type: string
        default: src/frontend
      python-version:
        required: false
        type: string
        default: '3.12'
      node-version:
        required: false
        type: string
        default: '20'
      database-url:
        required: false
        type: string
        default: postgresql+psycopg://postgres:postgres@localhost:5432/elite_db
      postgres-user:
        required: false
        type: string
        default: postgres
      postgres-password:
        required: false
        type: string
        default: postgres
      postgres-db:
        required: false
        type: string
        default: elite_db
      pact-dir:
        required: false
        type: string
        default: pacts
      consumer-test-command:
        required: false
        type: string
        default: npm run test:contracts
      provider-test-command:
        required: false
        type: string
        default: pytest tests/contracts/
    secrets:
      ci-secret-key:
        description: "Secret key for backend sessions and contract tests"
        required: true

jobs:
  consumer:
    name: Consumer contract tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}/${{ inputs.frontend-dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.project-dir }}/${{ inputs.frontend-dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run consumer contract tests
        run: ${{ inputs.consumer-test-command }}

      - name: Upload pacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: pacts
          path: ${{ inputs.project-dir }}/${{ inputs.frontend-dir }}/${{ inputs.pact-dir }}
          if-no-files-found: error

  provider:
    name: Provider contract verification
    needs: [consumer]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ inputs.postgres-user }}
          POSTGRES_PASSWORD: ${{ inputs.postgres-password }}
          POSTGRES_DB: ${{ inputs.postgres-db }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: ${{ inputs.project-dir }}/${{ inputs.backend-dir }}/pyproject.toml

      - name: Install backend dependencies
        working-directory: ${{ inputs.project-dir }}/${{ inputs.backend-dir }}
        run: pip install -e ".[dev]"

      - name: Run migrations
        working-directory: ${{ inputs.project-dir }}/${{ inputs.backend-dir }}
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          SECRET_KEY: ${{ secrets.ci-secret-key }}
        run: alembic upgrade head

      - name: Download pacts
        uses: actions/download-artifact@fa0a91aed85a86311d64dba7e7c34213bd06ea25 # v4
        with:
          name: pacts
          path: ${{ inputs.project-dir }}/${{ inputs.frontend-dir }}/${{ inputs.pact-dir }}

      - name: Run provider verification
        working-directory: ${{ inputs.project-dir }}/${{ inputs.backend-dir }}
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          TEST_DATABASE_URL: ${{ inputs.database-url }}
          SECRET_KEY: ${{ secrets.ci-secret-key }}
        run: ${{ inputs.provider-test-command }}

  required:
    name: Contract tests required
    needs: [consumer, provider]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check contract test jobs passed
        run: |
          if [ "${{ needs.consumer.result }}" != "success" ] || [ "${{ needs.provider.result }}" != "success" ]; then
            echo "Contract tests failed."
            exit 1
          fi
          echo "Contract tests passed."
