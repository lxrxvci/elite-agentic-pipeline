name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

env:
  PROJECT_DIR: example_project
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/elite_db
  SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}

jobs:
  consumer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}/src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/src/frontend/package-lock.json
      - run: npm ci
      - run: npm run test:contracts
      - uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: ${{ env.PROJECT_DIR }}/src/frontend/pacts
          if-no-files-found: error

  provider:
    needs: [consumer]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: elite_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.PROJECT_DIR }}/src/backend/pyproject.toml
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Run migrations
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
        run: alembic upgrade head
      - name: Start backend
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
          ENV: development
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
      - name: Download pacts
        uses: actions/download-artifact@v4
        with:
          name: pacts
          path: ${{ env.PROJECT_DIR }}/src/frontend/pacts
      - name: Run provider verification
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TEST_DATABASE_URL: ${{ env.DATABASE_URL }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
        run: pytest tests/contracts/

  required:
    name: Contract tests required
    needs: [consumer, provider]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check contract test jobs passed
        run: |
          if [ "${{ needs.consumer.result }}" != "success" ] || [ "${{ needs.provider.result }}" != "success" ]; then
            echo "Contract tests failed."
            exit 1
          fi
          echo "Contract tests passed."
