name: Deploy

# Staging → production canary deployment workflow.
#
# Foodcart SaaS learnings:
# - Multi-tenant SaaS needs subdomain smoke tests (e.g. slug.example.com) in
#   addition to root health checks.
# - Canary percentage, request count, and latency/error thresholds should be
#   configurable per squad.
# - Vercel Edge Config script path and canary analysis script path are
#   parameterized so squads can plug in their own helpers.

on:
  workflow_run:
    workflows: [CI, Security]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      project-dir:
        required: false
        type: string
        default: example_project
        description: "Repository-relative path to the project root."
  workflow_call:
    inputs:
      project-dir:
        required: false
        type: string
        default: example_project
        description: "Repository-relative path to the project root."
      canary-percentage:
        required: false
        type: number
        default: 5
      canary-analysis-requests:
        required: false
        type: number
        default: 100
      canary-analysis-max-error-rate:
        required: false
        type: number
        default: 0.10
      canary-analysis-max-latency-p99:
        required: false
        type: number
        default: 10.0
      smoke-backend-path:
        required: false
        type: string
        default: /health
      smoke-subdomain-slug:
        required: false
        type: string
        description: "Optional published tenant slug for subdomain smoke tests"
        default: ""
      edge-config-script:
        required: false
        type: string
        default: scripts/update_edge_config_canary.py
      canary-analysis-script:
        required: false
        type: string
        default: scripts/canary_analysis.py

env:
  PROJECT_DIR: ${{ inputs.project-dir || 'example_project' }}
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  VERCEL_CLI_VERSION: "54.15.0"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Deploy gate check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          REPO: ${{ github.repository }}
          CI_WORKFLOW: ${{ vars.CI_WORKFLOW_NAME || 'CI' }}
          SECURITY_WORKFLOW: ${{ vars.SECURITY_WORKFLOW_NAME || 'Security' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "Manual/reusable deploy gate passed"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Checking $CI_WORKFLOW and $SECURITY_WORKFLOW workflow runs for $HEAD_SHA..."
          ci_status=$(gh api "repos/$REPO/actions/workflows/${CI_WORKFLOW}/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].conclusion')
          sec_status=$(gh api "repos/$REPO/actions/workflows/${SECURITY_WORKFLOW}/runs?head_sha=$HEAD_SHA&per_page=1" --jq '.workflow_runs[0].conclusion')
          echo "CI conclusion: $ci_status"
          echo "Security conclusion: $sec_status"
          if [ "$ci_status" = "success" ] && [ "$sec_status" = "success" ]; then
            echo "Both CI and Security succeeded."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$ci_status" = "failure" ] || [ "$ci_status" = "cancelled" ] || [ "$sec_status" = "failure" ] || [ "$sec_status" = "cancelled" ]; then
            echo 'CI or Security did not succeed; blocking deploy.'
            exit 1
          else
            echo 'CI or Security is still in progress; skipping deploy until the other workflow completes.'
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  migrate-staging:
    name: Migrate staging
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Backup reminder
        run: echo "Ensure a database backup has been taken before proceeding."
      - name: Run migrations
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: alembic upgrade head

  deploy-backend-staging:
    name: Deploy backend to staging
    needs: [migrate-staging]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel staging
        id: deploy
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_STAGING }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  deploy-frontend-staging:
    name: Deploy frontend to staging
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/src/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Install frontend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/frontend
        run: npm ci
      - name: Deploy frontend to Vercel staging
        id: deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:8000/api/v1' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND_STAGING }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" -b "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  smoke-staging:
    name: Smoke test staging
    needs: [deploy-backend-staging, deploy-frontend-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test staging
        env:
          BACKEND_URL: ${{ needs.deploy-backend-staging.outputs.url }}
          FRONTEND_URL: ${{ needs.deploy-frontend-staging.outputs.url }}
          SUBDOMAIN_SLUG: ${{ inputs.smoke-subdomain-slug }}
        run: |
          echo "Running smoke tests against staging..."
          curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL${{ inputs.smoke-backend-path }}"
          curl --fail --retry 5 --retry-delay 10 "$FRONTEND_URL"
          if [ -n "$SUBDOMAIN_SLUG" ]; then
            echo "Checking subdomain routing for $SUBDOMAIN_SLUG"
            curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL/public/sites/$SUBDOMAIN_SLUG" || true
          fi

  migrate-production:
    name: Migrate production
    needs: [smoke-staging]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Backup reminder
        run: echo "Ensure a database backup has been taken before proceeding."
      - name: Run migrations
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: alembic upgrade head

  deploy-backend-canary:
    name: Deploy backend canary
    needs: [migrate-production]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel canary project
        id: deploy
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_CANARY }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  enable-canary:
    name: Enable backend canary routing
    needs: [deploy-backend-canary]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Route traffic to canary backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
          CANARY_API_URL: ${{ needs.deploy-backend-canary.outputs.url }}
        run: |
          python ${{ env.PROJECT_DIR }}/${{ inputs.edge-config-script }} \
            --edge-config-id "$VERCEL_EDGE_CONFIG_ID" \
            --token "$VERCEL_TOKEN" \
            --percentage ${{ inputs.canary-percentage }} \
            --api-url "$CANARY_API_URL"
      - name: Wait for Edge Config propagation
        run: sleep 30

  deploy-frontend-production:
    name: Deploy frontend to production
    needs: [smoke-staging, enable-canary]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/src/frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Install frontend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/frontend
        run: npm ci
      - name: Deploy frontend to Vercel production
        id: deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.PRODUCTION_API_URL || 'http://localhost:8000/api/v1' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod -b "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" --yes)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  canary-analysis:
    name: Canary analysis
    needs: [deploy-backend-canary, deploy-frontend-production]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run canary analysis
        env:
          BASELINE_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          CANARY_URL: ${{ needs.deploy-backend-canary.outputs.url }}
        run: |
          echo "Running canary analysis: baseline=$BASELINE_URL canary=$CANARY_URL"
          python ${{ env.PROJECT_DIR }}/${{ inputs.canary-analysis-script }} \
            --url "$BASELINE_URL${{ inputs.smoke-backend-path }}" \
            --canary-url "$CANARY_URL${{ inputs.smoke-backend-path }}" \
            --baseline-url "$BASELINE_URL${{ inputs.smoke-backend-path }}" \
            --requests ${{ inputs.canary-analysis-requests }} \
            --concurrency 5 \
            --max-error-rate ${{ inputs.canary-analysis-max-error-rate }} \
            --max-latency-p99 ${{ inputs.canary-analysis-max-latency-p99 }} \
            --max-error-rate-regression 0.05 \
            --max-latency-regression 1.0

  promote-canary:
    name: Promote canary to production
    needs: [canary-analysis, deploy-backend-canary]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Deploy backend to Vercel production project
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
        run: |
          url=$(vercel --cwd "$GITHUB_WORKSPACE" --token "$VERCEL_TOKEN" --prod --yes)
          echo "Promoted backend to production: $url"
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Disable canary routing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
        run: |
          python ${{ env.PROJECT_DIR }}/${{ inputs.edge-config-script }} \
            --edge-config-id "$VERCEL_EDGE_CONFIG_ID" \
            --token "$VERCEL_TOKEN" \
            --percentage 0

  smoke-production:
    name: Smoke test production
    needs: [promote-canary, deploy-frontend-production]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test production
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          FRONTEND_URL: ${{ needs.deploy-frontend-production.outputs.url }}
          SUBDOMAIN_SLUG: ${{ inputs.smoke-subdomain-slug }}
        run: |
          echo "Running smoke tests against production..."
          curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL${{ inputs.smoke-backend-path }}"
          curl --fail --retry 5 --retry-delay 10 "$FRONTEND_URL"
          if [ -n "$SUBDOMAIN_SLUG" ]; then
            echo "Checking subdomain routing for $SUBDOMAIN_SLUG"
            curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL/public/sites/$SUBDOMAIN_SLUG" || true
          fi

  rollback-on-failure:
    name: Rollback on failure
    needs: [canary-analysis, smoke-production]
    if: failure()
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/src/backend
        run: pip install -e ".[dev]"
      - name: Disable canary routing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_EDGE_CONFIG_ID: ${{ secrets.VERCEL_EDGE_CONFIG_ID }}
        run: |
          python ${{ env.PROJECT_DIR }}/${{ inputs.edge-config-script }} \
            --edge-config-id "$VERCEL_EDGE_CONFIG_ID" \
            --token "$VERCEL_TOKEN" \
            --percentage 0 || true
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Vercel CLI
        run: npm install -g "vercel@${{ env.VERCEL_CLI_VERSION }}"
      - name: Rollback production deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_BACKEND: ${{ secrets.VERCEL_PROJECT_ID_BACKEND }}
          VERCEL_PROJECT_ID_FRONTEND: ${{ secrets.VERCEL_PROJECT_ID_FRONTEND }}
        run: |
          set -euo pipefail
          team_q=""
          if [ -n "$VERCEL_ORG_ID" ]; then
            team_q="?teamId=${VERCEL_ORG_ID}"
          fi

          previous_url() {
            project_id="$1"
            curl -sS "https://api.vercel.com/v6/deployments?projectId=${project_id}&target=production&limit=2&state=READY${team_q}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              | python3 -c "import sys, json; ds=json.load(sys.stdin).get('deployments', []); print(ds[1]['url'] if len(ds) > 1 else '')"
          }

          backend_url=$(previous_url "$VERCEL_PROJECT_ID_BACKEND")
          frontend_url=$(previous_url "$VERCEL_PROJECT_ID_FRONTEND")

          if [ -n "$backend_url" ]; then
            echo "Rolling back backend to https://$backend_url ..."
            vercel rollback "https://$backend_url" --token "$VERCEL_TOKEN" --yes
          else
            echo "No previous backend deployment found; skipping backend rollback."
          fi

          if [ -n "$frontend_url" ]; then
            echo "Rolling back frontend to https://$frontend_url ..."
            vercel rollback "https://$frontend_url" --token "$VERCEL_TOKEN" --yes
          else
            echo "No previous frontend deployment found; skipping frontend rollback."
          fi
      - name: Verify rollback health
        env:
          BACKEND_URL: ${{ vars.PRODUCTION_BACKEND_URL }}
          FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
        run: |
          echo "Verifying rollback health..."
          curl -fsS --retry 10 --retry-delay 5 "$BACKEND_URL${{ inputs.smoke-backend-path }}" || exit 1
          curl -fsS --retry 10 --retry-delay 5 "$FRONTEND_URL" || exit 1
