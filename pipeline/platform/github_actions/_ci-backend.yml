name: CI — Backend

on:
  workflow_call:
    inputs:
      project-dir:
        required: false
        type: string
        default: example_project
        description: "Repository-relative path to the project root."
      python-version:
        required: true
        type: string
        description: "Python version for the backend (e.g. '3.12')."
      database-url:
        required: true
        type: string
        description: "SQLAlchemy-compatible DATABASE_URL for the test database."
      backend-dir:
        required: false
        type: string
        default: src/backend
        description: "Path from project-dir to the backend package."
      coverage-fail-under:
        required: false
        type: number
        default: 80
        description: "Minimum total coverage percentage required to pass."
      coverage-include:
        required: false
        type: string
        default: ""
        description: >-
          Optional comma-separated pytest --cov source paths. Leave empty to use
          the project's pyproject.toml coverage configuration.
      scoped-test-dir:
        required: false
        type: string
        default: ""
        description: >-
          Optional directory of scoped tests to run instead of the full suite
          (e.g. 'tests/foodcart').
      run-migrations:
        required: false
        type: boolean
        default: true
        description: "Run Alembic migrations before tests."
      postgres-user:
        required: false
        type: string
        default: postgres
        description: "PostgreSQL user for the CI service container."
      postgres-password:
        required: false
        type: string
        default: postgres
        description: "PostgreSQL password for the CI service container."
      postgres-db:
        required: false
        type: string
        default: elite_db
        description: "PostgreSQL database name for the CI service container."
    secrets:
      ci-secret-key:
        required: true
        description: "Secret key for CI tests and contract tests."
      clerk-jwks-url:
        required: false
        description: "Optional Clerk JWKS URL for auth integration tests."
      clerk-issuer:
        required: false
        description: "Optional Clerk issuer for auth integration tests."
      redis-url:
        required: false
        description: "Optional Redis URL for rate-limiting/quota tests."
      openai-api-key:
        required: false
        description: "Optional OpenAI API key for AI assistant integration tests."
      anthropic-api-key:
        required: false
        description: "Optional Anthropic API key for AI assistant integration tests."

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}/${{ inputs.backend-dir }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ inputs.postgres-user }}
          POSTGRES_PASSWORD: ${{ inputs.postgres-password }}
          POSTGRES_DB: ${{ inputs.postgres-db }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: ${{ inputs.project-dir }}/${{ inputs.backend-dir }}/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: SAST scan (bandit)
        run: bandit -r src -ll -ii

      - name: Run migrations
        if: inputs.run-migrations
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          SECRET_KEY: ${{ secrets.ci-secret-key }}
          CLERK_JWKS_URL: ${{ secrets.clerk-jwks-url || '' }}
          CLERK_ISSUER: ${{ secrets.clerk-issuer || '' }}
          REDIS_URL: ${{ secrets.redis-url || '' }}
          OPENAI_API_KEY: ${{ secrets.openai-api-key || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key || '' }}
        run: alembic upgrade head

      - name: Unit & integration tests
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          TEST_DATABASE_URL: ${{ inputs.database-url }}
          SECRET_KEY: ${{ secrets.ci-secret-key }}
          CLERK_JWKS_URL: ${{ secrets.clerk-jwks-url || '' }}
          CLERK_ISSUER: ${{ secrets.clerk-issuer || '' }}
          REDIS_URL: ${{ secrets.redis-url || '' }}
          OPENAI_API_KEY: ${{ secrets.openai-api-key || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key || '' }}
        run: |
          if [ -n "${{ inputs.scoped-test-dir }}" ]; then
            pytest ${{ inputs.scoped-test-dir }} \
              ${{ inputs.coverage-include }} \
              --cov-report=term-missing \
              --cov-fail-under=${{ inputs.coverage-fail-under }}
          elif [ -n "${{ inputs.coverage-include }}" ]; then
            pytest ${{ inputs.coverage-include }} \
              --cov-report=term-missing \
              --cov-fail-under=${{ inputs.coverage-fail-under }}
          else
            pytest --cov=src \
              --cov-report=term-missing \
              --cov-report=xml:coverage.xml \
              --cov-report=html:coverage_html \
              --cov-fail-under=${{ inputs.coverage-fail-under }}
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: backend-coverage
          path: |
            ${{ inputs.project-dir }}/${{ inputs.backend-dir }}/coverage.xml
            ${{ inputs.project-dir }}/${{ inputs.backend-dir }}/coverage_html
            ${{ inputs.project-dir }}/${{ inputs.backend-dir }}/coverage.json
          if-no-files-found: ignore
